name: Build and Upload Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build AppImage
        run: npx electron-builder --linux --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload AppImage
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows zip
        run: npx electron-builder --win --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload Windows zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  publish-aur:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute AppImage SHA256
        id: sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          URL="https://github.com/CriticalRange/CoreSound/releases/download/v${VERSION}/CoreSound-${VERSION}.AppImage"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha256.outputs.sha256 }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" aur/PKGBUILD

      - name: Generate .SRCINFO
        uses: nicholasgasior/action-makepkg@v1
        with:
          run: mksrcinfo
          workdir: aur

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: coresound-bin
          pkgbuild: ./aur/PKGBUILD
          commit_username: CriticalRange
          commit_email: muhksgn@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
