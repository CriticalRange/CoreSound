name: Build and Publish Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and publish AppImage
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build and publish Windows installer
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-store:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Compile RFCOMM helper to standalone exe
        run: pip install pyinstaller && pyinstaller --onefile --distpath src --name rfcomm-helper src/rfcomm-helper.py

      - name: Build Store MSIX
        run: npm run dist:win:store
        # Note: dist:win:store uses --publish never so no GH_TOKEN needed here

      # Submission requires 5 GitHub secrets — safe to skip until secrets are added.
      # Set them in: GitHub repo → Settings → Secrets and variables → Actions
      #   STORE_SELLER_ID   — Partner Center → Account settings → Account info (numeric ID)
      #   STORE_PRODUCT_ID  — Partner Center → Your app → Product identity (9N... format)
      #   STORE_TENANT_ID   — Azure Portal → Azure Active Directory → Tenant ID
      #   STORE_CLIENT_ID   — Azure Portal → App registrations → your app → Client ID
      #   STORE_CLIENT_SECRET — Azure Portal → App registrations → Certificates & secrets
      - name: Submit to Microsoft Store
        uses: wdzeng/windows-store-action@v1
        continue-on-error: true
        with:
          seller-id: ${{ secrets.STORE_SELLER_ID }}
          product-id: ${{ secrets.STORE_PRODUCT_ID }}
          tenant-id: ${{ secrets.STORE_TENANT_ID }}
          client-id: ${{ secrets.STORE_CLIENT_ID }}
          client-secret: ${{ secrets.STORE_CLIENT_SECRET }}
          msix-path: dist/*.appx

  publish-aur:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Compute AppImage SHA256
        id: sha256
        run: |
          VERSION=${{ steps.version.outputs.version }}
          URL="https://github.com/CriticalRange/CoreSound/releases/download/v${VERSION}/CoreSound-${VERSION}.AppImage"
          SHA=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version and checksum
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA=${{ steps.sha256.outputs.sha256 }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" aur/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA}')/" aur/PKGBUILD

      - name: Push to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        with:
          pkgname: coresound-bin
          pkgbuild: ./aur/PKGBUILD
          commit_username: CriticalRange
          commit_email: muhksgn@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
          allow_empty_commits: false
          force_push: false
